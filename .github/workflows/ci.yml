name: CI

on:
  push:
    branches: [main]
    paths:
      - bin/**
      - tests/**
      - "**/*.py"
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]
    paths:
      - bin/**
      - tests/**
      - "**/*.py"
      - .github/workflows/ci.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest ruff

      - name: Lint with ruff
        run: ruff check bin/fledge-docker tests/

      - name: Compile check
        run: python -m py_compile bin/fledge-docker

      - name: Run tests
        run: pytest tests/ -v
